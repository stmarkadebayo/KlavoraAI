run_name: contract_extract_v2_chunked_main
domain: contract
tier: main
model_name: unsloth/gemma-3-4b-it
dataset:
  train_path: data/processed/contract_main/train.jsonl
  val_path: data/processed/contract_main/val.jsonl
  test_path: data/processed/contract_main/test.jsonl
output_dir: training/outputs/contract_extract_v2_chunked_main
adapter_output_dir: adapters/contract/contract_extract_v2_chunked_main
max_seq_length: 1024
load_in_4bit: true
seed: 3407
chat_template: gemma-3
response_only: true
preflight_max_removed_fraction: 0.1
preflight_max_p95_tokens: 1125
lora:
  r: 8
  alpha: 16
  dropout: 0.0
  bias: none
  gradient_checkpointing: unsloth
trainer:
  max_length: 1024
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  num_train_epochs: 2
  learning_rate: 0.0002
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  max_steps: -1
  optim: adamw_8bit
  lr_scheduler_type: cosine
  packing: false
